<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#58a6ff">
    <title>Scalping Radar Mobile</title>
    <link rel="manifest" href="/manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #0d1117; color: #e6edf3; padding: 12px; }
        h1 { font-size: 16px; margin-bottom: 8px; color: #58a6ff; }
        .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .top a { color: #58a6ff; text-decoration: none; font-size: 12px; }
        .session { font-size: 11px; color: #d29922; }
        .setup {
            background: #161b22; border-left: 5px solid #3fb950;
            border-radius: 6px; padding: 14px; margin-bottom: 12px;
        }
        .setup.sell { border-left-color: #ef5350; }
        .setup .pair { font-size: 22px; font-weight: 700; }
        .setup .dir { display: inline-block; padding: 4px 10px; background: #3fb950; color: white; border-radius: 4px; font-size: 12px; margin-left: 8px; }
        .setup.sell .dir { background: #ef5350; }
        .setup .levels { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
        .setup .level { background: #0d1117; padding: 8px; border-radius: 4px; }
        .setup .level .label { font-size: 9px; color: #6e7681; text-transform: uppercase; }
        .setup .level .value { font-size: 16px; font-family: monospace; font-weight: 700; }
        .verdict { font-size: 13px; padding: 8px; background: rgba(63,185,80,0.1); border-radius: 4px; margin-top: 10px; }
        .empty { text-align: center; padding: 40px 20px; color: #6e7681; }
        .refresh { background: #58a6ff; color: white; border: none; padding: 10px 20px; border-radius: 6px; width: 100%; font-weight: 600; margin-bottom: 12px; }
        .conf-score { float: right; font-size: 14px; color: #6e7681; }
    </style>
</head>
<body>
    <div class="top">
        <h1>📡 Scalping Radar Mobile</h1>
        <a href="/">Vue complète →</a>
    </div>
    <div class="session" id="session"></div>
    <button class="refresh" onclick="loadSetups()">🔄 Actualiser</button>
    <div id="setups" class="empty">Chargement...</div>

    <script>
        async function loadSetups() {
            try {
                const res = await fetch('/api/trade-setups');
                const setups = await res.json();
                // Filtrer TAKE uniquement
                const take = setups.filter(s => s.verdict_action === 'TAKE');
                const container = document.getElementById('setups');
                if (!take.length) {
                    container.innerHTML = '<div class="empty">Aucun signal "PRENDRE" actuellement.<br><br>Le radar scanne en arrière-plan.</div>';
                    container.className = 'empty';
                    return;
                }
                container.className = '';
                container.innerHTML = take.map(s => `
                    <div class="setup ${s.direction === 'sell' ? 'sell' : ''}">
                        <span class="pair">${s.pair}</span>
                        <span class="dir">${s.direction === 'buy' ? 'ACHAT' : 'VENTE'}</span>
                        <span class="conf-score">${(s.confidence_score || 0).toFixed(0)}/100</span>
                        <div class="levels">
                            <div class="level"><div class="label">Entry</div><div class="value">${s.entry_price.toFixed(4)}</div></div>
                            <div class="level"><div class="label">SL</div><div class="value">${s.stop_loss.toFixed(4)}</div></div>
                            <div class="level"><div class="label">TP1</div><div class="value">${s.take_profit_1.toFixed(4)}</div></div>
                            <div class="level"><div class="label">TP2</div><div class="value">${s.take_profit_2.toFixed(4)}</div></div>
                        </div>
                        ${s.verdict_summary ? `<div class="verdict">✅ ${s.verdict_summary}</div>` : ''}
                    </div>
                `).join('');
            } catch (e) { console.error(e); }
        }
        function loadSession() {
            const now = new Date();
            const h = now.getUTCHours();
            const wd = now.getUTCDay();
            const sessions = [];
            const closed = (wd === 6) || (wd === 0 && h < 22) || (wd === 5 && h >= 22);
            if (!closed) {
                if (h >= 22 || h < 7) sessions.push('Sydney');
                if (0 <= h && h < 9) sessions.push('Tokyo');
                if (8 <= h && h < 17) sessions.push('London');
                if (13 <= h && h < 22) sessions.push('New York');
            }
            document.getElementById('session').textContent = sessions.length ? `Sessions actives : ${sessions.join(', ')}` : 'Marché fermé';
        }
        loadSession();
        loadSetups();
        setInterval(loadSetups, 15000);
        setInterval(loadSession, 60000);
    </script>
</body>
</html>
