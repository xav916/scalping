<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#58a6ff">
    <meta name="robots" content="noindex, nofollow">
    <title>Connexion — Scalping Radar</title>
    <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' fill='%230d1117'/><text x='50%25' y='58%25' font-size='34' text-anchor='middle' fill='%2358a6ff' font-family='monospace'>SR</text></svg>">
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-card: #1c2128;
            --border-color: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #6e7681;
            --accent-blue: #58a6ff;
            --accent-red: #f85149;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 32px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        h1 {
            font-size: 20px;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }
        .subtitle {
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 24px;
        }
        label {
            display: block;
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 14px;
            margin-bottom: 16px;
        }
        input:focus-visible {
            outline: 2px solid var(--accent-blue);
            outline-offset: 1px;
            border-color: var(--accent-blue);
        }
        button {
            width: 100%;
            padding: 10px 16px;
            background: var(--accent-blue);
            border: 1px solid var(--accent-blue);
            color: #0d1117;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            min-height: 44px;
        }
        button:hover { filter: brightness(1.1); }
        button:focus-visible {
            outline: 2px solid var(--accent-blue);
            outline-offset: 2px;
        }
        button:disabled { opacity: 0.6; cursor: wait; }
        .error {
            background: rgba(248, 81, 73, 0.15);
            border: 1px solid var(--accent-red);
            color: var(--accent-red);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <main class="login-card">
        <h1>Scalping Radar</h1>
        <p class="subtitle">Connexion requise</p>
        <div id="error" class="error" role="alert" hidden></div>
        <form id="login-form" autocomplete="on">
            <label for="username">Identifiant</label>
            <input type="text" id="username" name="username" autocomplete="username" autofocus required>
            <label for="password">Mot de passe</label>
            <input type="password" id="password" name="password" autocomplete="current-password" required>
            <button type="submit" id="submit">Se connecter</button>
        </form>
    </main>

    <script>
        (function () {
            const form = document.getElementById('login-form');
            const submitBtn = document.getElementById('submit');
            const errorEl = document.getElementById('error');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                errorEl.hidden = true;
                submitBtn.disabled = true;
                const originalLabel = submitBtn.textContent;
                submitBtn.textContent = 'Connexion…';

                try {
                    const res = await fetch('/api/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'same-origin',
                        body: JSON.stringify({
                            username: document.getElementById('username').value,
                            password: document.getElementById('password').value,
                        }),
                    });
                    if (res.ok) {
                        // Redirection vers la page d'origine (param ?next=) ou la racine.
                        const next = new URLSearchParams(window.location.search).get('next') || '/';
                        window.location.replace(next);
                        return;
                    }
                    const body = await res.json().catch(() => ({}));
                    errorEl.textContent = body.detail || 'Identifiants incorrects';
                    errorEl.hidden = false;
                } catch (err) {
                    errorEl.textContent = 'Erreur réseau : ' + err.message;
                    errorEl.hidden = false;
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = originalLabel;
                }
            });
        })();
    </script>
</body>
</html>
