<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#58a6ff">
    <meta name="robots" content="noindex, nofollow">
    <title>Connexion — Scalping Radar</title>
    <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' fill='%230d1117'/><text x='50%25' y='58%25' font-size='34' text-anchor='middle' fill='%2358a6ff' font-family='monospace'>SR</text></svg>">
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-card: #1c2128;
            --bg-input: #0d1117;
            --border-color: #30363d;
            --border-strong: #3d4450;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #6e7681;
            --accent-blue: #58a6ff;
            --accent-blue-fade: rgba(88, 166, 255, 0.25);
            --accent-red: #f85149;
            --accent-red-bg: rgba(248, 81, 73, 0.08);
            --accent-red-border: rgba(248, 81, 73, 0.35);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            /* Subtil halo radial derrière la carte pour donner de la profondeur
               sans tomber dans le glow tapageur */
            background-image: radial-gradient(ellipse 600px 400px at 50% 40%, rgba(88, 166, 255, 0.05) 0%, transparent 70%);
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 28px 28px 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        }

        .logo-badge {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 18px;
            font-family: 'SF Mono', 'Consolas', 'Menlo', monospace;
            font-weight: 700;
            font-size: 15px;
            letter-spacing: 1px;
            color: var(--accent-blue);
        }

        h1 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
            letter-spacing: -0.2px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 13px;
            margin-bottom: 22px;
            line-height: 1.4;
        }

        .alert {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            background: var(--accent-red-bg);
            border: 1px solid var(--accent-red-border);
            color: var(--accent-red);
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            line-height: 1.4;
        }
        .alert svg { flex-shrink: 0; margin-top: 1px; }

        .field {
            margin-bottom: 14px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.12s, box-shadow 0.12s;
        }
        input:hover:not(:focus) { border-color: var(--border-strong); }
        input:focus-visible {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px var(--accent-blue-fade);
        }
        input[autocomplete="current-password"] { letter-spacing: 0.05em; }

        button[type="submit"] {
            width: 100%;
            padding: 11px 16px;
            background: var(--accent-blue);
            color: #0d1117;
            border: 1px solid var(--accent-blue);
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            min-height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 6px;
            transition: filter 0.1s, transform 0.05s;
        }
        button[type="submit"]:hover:not(:disabled) { filter: brightness(1.08); }
        button[type="submit"]:active:not(:disabled) { transform: translateY(1px); }
        button[type="submit"]:focus-visible {
            outline: none;
            box-shadow: 0 0 0 2px var(--bg-primary), 0 0 0 4px var(--accent-blue);
        }
        button[type="submit"]:disabled {
            opacity: 0.7;
            cursor: wait;
        }

        /* Spinner (SVG inline, animé via CSS — pas de dep) */
        .spinner {
            width: 14px;
            height: 14px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (prefers-reduced-motion: reduce) {
            .spinner { animation: none; }
        }

        .hint {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 20px;
            line-height: 1.4;
        }

        /* Mobile serré : touch target + padding confortable */
        @media (max-width: 380px) {
            .login-card { padding: 24px 20px 20px; }
            h1 { font-size: 18px; }
        }
    </style>
</head>
<body>
    <main class="login-card">
        <div class="logo-badge" aria-hidden="true">SR</div>
        <h1>Scalping Radar</h1>
        <p class="subtitle">Connectez-vous pour accéder à votre dashboard de trading.</p>

        <div id="error" class="alert" role="alert" hidden>
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <span id="error-msg"></span>
        </div>

        <form id="login-form" autocomplete="on" novalidate>
            <div class="field">
                <label for="username">Identifiant</label>
                <input type="text" id="username" name="username" autocomplete="username" autofocus required>
            </div>
            <div class="field">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required>
            </div>
            <button type="submit" id="submit">
                <span id="submit-label">Se connecter</span>
                <svg id="submit-spinner" class="spinner" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" aria-hidden="true" hidden>
                    <path d="M21 12a9 9 0 1 1-6.22-8.56" />
                </svg>
            </button>
        </form>

        <p class="hint">Session privée — n'entrez pas vos identifiants sur une autre URL que <code style="color:var(--accent-blue)">scalping-radar.duckdns.org</code>.</p>
    </main>

    <script src="/js/login.js"></script>
</body>
</html>
